<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do List</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">

        <h1>To-Do List</h1>

        <div class="input-section">

            <input
                type="text"
                id="taskInput"
                placeholder="Enter a new task">

            <button id="addBtn">
                Add Task
            </button>

        </div>

        <h2>Tasks</h2>

        <ul id="taskList">

            <li>Complete HTML & CSS To-Do App</li>

        </ul>

    </div>

    <script src="script.js"></script>

</body>
</html>
